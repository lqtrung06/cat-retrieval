name: Security audit

on:
  schedule:
    - cron: "0 0 * * *"

  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"

  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"

  workflow_dispatch:

jobs:
  security_audit:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Scan dependencies
        run: cargo deny check advisories
